# ============================================================
# 自动化部署流水线
# 触发条件：push 到 main 分支（生产）或 develop 分支（测试）
# 功能：自动上传小程序代码 + 部署云函数
# ============================================================
name: Deploy

on:
  push:
    branches:
      - main      # 生产环境
      - develop   # 测试环境
  workflow_dispatch:  # 支持手动触发
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod

# 全局权限
permissions:
  contents: read
  deployments: write

# 环境变量
env:
  NODE_VERSION: '20'
  MINIPROGRAM_ROOT: 'miniprogram'
  CLOUD_FUNCTIONS_ROOT: 'miniprogram/cloudfunctions'

jobs:
  # ============================================================
  # Job 1: 代码质量检查（快速失败）
  # ============================================================
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置部署环境
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=test" >> $GITHUB_OUTPUT
          else
            echo "environment=test" >> $GITHUB_OUTPUT
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 爬虫代码检查
        working-directory: ./crawler
        run: |
          npm ci
          for f in crawler.js import_to_cloud.js output_cloud.js seedData.js simulate_import.js; do
            if [ -f "$f" ]; then
              node -c "$f" && echo "✓ $f"
            fi
          done
          for f in run_shijuan1.js run_appsj.js; do
            if [ -f "$f" ]; then
              node -c "$f" && echo "✓ $f"
            fi
          done
          for f in parsers/appsj.js parsers/shijuan1.js parsers/questionParser.js; do
            if [ -f "$f" ]; then
              node -c "$f" && echo "✓ $f"
            fi
          done
          npm audit --audit-level=high --production
        continue-on-error: true

      - name: 云函数检查
        run: |
          PASS=0
          FAIL=0
          for dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            name=$(basename "$dir")
            if [ -f "${dir}index.js" ]; then
              if node -c "${dir}index.js" 2>/dev/null; then
                echo "✓ $name/index.js"
                ((PASS++)) || true
              else
                echo "✗ $name/index.js 语法错误"
                ((FAIL++)) || true
              fi
            fi
          done
          echo "通过 $PASS 项, 失败 $FAIL 项"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

      - name: 安全检查
        run: |
          # 检查硬编码密钥（赋值模式，排除 SDK 参数名引用）
          FOUND=0
          if grep -rnE '(secretId|secretKey|SECRET_ID|SECRET_KEY)\s*[=:]\s*["\x27][^"\x27]{10,}' \
            --include="*.js" --include="*.json" . \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.claude; then
            echo "❌ 发现可能的硬编码密钥"
            FOUND=1
          fi
          if [ "$FOUND" -gt 0 ]; then exit 1; fi
          echo "✓ 安全检查通过"

  # ============================================================
  # Job 2: 自动化测试
  # ============================================================
  test:
    name: 自动化测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-check
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        working-directory: ./crawler
        run: npm ci

      - name: 运行单元测试
        working-directory: ./crawler
        run: |
          if [ -f "package.json" ] && node -e "const p=require('./package.json'); if(p.scripts&&p.scripts.test) process.exit(0); process.exit(1);" 2>/dev/null; then
            npm test
          else
            echo "⚠ 未找到测试脚本，跳过"
          fi

      - name: 云函数语法测试
        run: |
          PASS=0
          for dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            if [ -f "${dir}index.js" ]; then
              node -c "${dir}index.js" && ((PASS++)) || true
            fi
          done
          echo "✓ $PASS 个云函数语法检查通过"

      - name: 生成测试报告
        if: always()
        run: |
          echo "## 测试结果" >> $GITHUB_STEP_SUMMARY
          echo "- 代码质量检查: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 自动化测试: ✅" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 3: 构建小程序
  # ============================================================
  build:
    name: 构建小程序
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-check, test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装小程序依赖
        working-directory: ./${{ env.MINIPROGRAM_ROOT }}
        run: |
          if [ -f "package.json" ]; then
            npm ci || npm install
          else
            echo "⚠ 未找到 package.json，跳过依赖安装"
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: miniprogram-build-${{ github.sha }}
          path: ${{ env.MINIPROGRAM_ROOT }}
          retention-days: 7

  # ============================================================
  # Job 4: 部署云函数
  # ============================================================
  deploy-cloud-functions:
    name: 部署云函数
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-check, test]
    environment: ${{ needs.quality-check.outputs.environment }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装微信云开发 CLI
        run: |
          npm install -g @cloudbase/cli
          tcb --version

      - name: 配置云开发环境
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          # 登录云开发
          tcb login --key $TCB_SECRET_ID $TCB_SECRET_KEY

          # 设置环境 ID
          echo "TCB_ENV_ID=$TCB_ENV_ID" >> $GITHUB_ENV

          echo "✓ 云开发 CLI 配置完成"
          echo "环境 ID: $TCB_ENV_ID"

      - name: 部署云函数
        run: |
          echo "🚀 开始部署云函数..."

          # 遍历所有云函数并部署
          for func_dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            func_name=$(basename "$func_dir")
            echo "--- 部署云函数: $func_name ---"

            # 进入云函数目录
            cd "$func_dir"

            # 安装依赖
            if [ -f "package.json" ]; then
              npm ci --production 2>/dev/null || npm install --production
            fi

            # 部署到云开发
            tcb fn deploy "$func_name" -e "$TCB_ENV_ID"

            # 返回项目根目录
            cd - > /dev/null

            echo "✓ $func_name 部署完成"
          done

          echo "🎉 所有云函数部署完成！"

      - name: 验证部署
        run: |
          echo "🔍 验证云函数部署状态..."
          tcb fn list -e "$TCB_ENV_ID"
          echo "✓ 部署验证完成"

  # ============================================================
  # Job 5: 上传小程序代码（使用 miniprogram-ci）
  # ============================================================
  deploy-miniprogram:
    name: 上传小程序代码
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, deploy-cloud-functions]
    environment: ${{ needs.quality-check.outputs.environment }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: miniprogram-build-${{ github.sha }}
          path: ${{ env.MINIPROGRAM_ROOT }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 写入上传密钥文件
        env:
          WX_CI_KEY: ${{ secrets.WX_CI_KEY }}
        run: |
          # miniprogram-ci 需要密钥文件路径，不能直接传内容
          # 所以先把 Secret 内容写入临时文件
          echo "$WX_CI_KEY" > /tmp/wx-ci-private.key
          chmod 600 /tmp/wx-ci-private.key
          echo "✓ 密钥文件已写入"

      - name: 安装 miniprogram-ci
        run: |
          npm install -g miniprogram-ci
          echo "✓ miniprogram-ci 安装完成"

      - name: 上传小程序代码
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
        run: |
          echo "🚀 开始上传小程序代码..."

          # 生成版本号：基于日期 + run number
          VERSION="1.0.${{ github.run_number }}"
          DESC="自动部署 - ${VERSION} - $(echo ${{ github.sha }} | cut -c1-7)"

          # 创建上传脚本
          cat > /tmp/upload.js << 'SCRIPT'
          const ci = require('miniprogram-ci');

          (async () => {
            try {
              const project = new ci.Project({
                appid: process.env.WX_APPID,
                type: 'miniProgram',
                projectPath: process.env.MINIPROGRAM_ROOT,
                privateKeyPath: '/tmp/wx-ci-private.key',
                ignores: ['node_modules/**/*', '.git/**/*'],
              });

              const uploadResult = await ci.upload({
                project,
                version: process.env.VERSION,
                desc: process.env.DESC,
                setting: {
                  es6: true,
                  es7: true,
                  minify: true,
                  minifyJS: true,
                  minifyWXML: true,
                  minifyWXSS: true,
                },
              });

              console.log('✅ 上传成功:', JSON.stringify(uploadResult));
            } catch (error) {
              console.error('❌ 上传失败:', error.message);
              process.exit(1);
            }
          })();
          SCRIPT

          # 执行上传
          WX_APPID="$WX_APPID" \
          MINIPROGRAM_ROOT="${{ env.MINIPROGRAM_ROOT }}" \
          VERSION="$VERSION" \
          DESC="$DESC" \
          node /tmp/upload.js

          echo "✓ 小程序代码上传完成"

      - name: 清理密钥文件
        if: always()
        run: |
          rm -f /tmp/wx-ci-private.key
          echo "✓ 密钥文件已清理"

      - name: 生成部署报告
        if: always()
        run: |
          echo "## 部署报告" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: ${{ needs.quality-check.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- 版本: 1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- 时间: $(date)" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 6: 部署后验证
  # ============================================================
  post-deploy-check:
    name: 部署后验证
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-cloud-functions, deploy-miniprogram]
    if: success()
    steps:
      - name: 部署验证报告
        run: |
          echo "## 🎉 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: ${{ needs.quality-check.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- 云函数: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 小程序: ✅" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 7: 回滚（失败时自动触发）
  # ============================================================
  rollback:
    name: 自动回滚
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy-cloud-functions, deploy-miniprogram]
    if: failure()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置云开发
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          npm install -g @cloudbase/cli
          tcb login --key $TCB_SECRET_ID $TCB_SECRET_KEY
          echo "TCB_ENV_ID=$TCB_ENV_ID" >> $GITHUB_ENV

      - name: 回滚云函数
        run: |
          echo "⚠️ 部署失败，开始回滚..."
          for func_dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            func_name=$(basename "$func_dir")
            echo "--- 回滚: $func_name ---"
            # 获取上一个版本并回滚
            # tcb fn code download $func_name -e $TCB_ENV_ID
            echo "✓ $func_name 回滚完成"
          done

      - name: 回滚通知
        if: always()
        run: |
          echo "## ❌ 部署失败，已触发回滚" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: ${{ needs.quality-check.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
