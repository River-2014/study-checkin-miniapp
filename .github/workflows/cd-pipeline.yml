# ============================================================
# 完整的 CI/CD 流水线（集成版）
# 触发条件：push 到 main/develop 分支
# 功能：代码检查 → 测试 → 构建 → 部署 → 验证
# ============================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
      skip_tests:
        description: '跳过测试'
        required: false
        default: 'false'
        type: boolean

# 全局权限
permissions:
  contents: read
  deployments: write
  issues: write
  pull-requests: write

# 环境变量
env:
  NODE_VERSION: '20'
  MINIPROGRAM_ROOT: 'miniprogram'
  CLOUD_FUNCTIONS_ROOT: 'miniprogram/cloudfunctions'
  CRAWLER_ROOT: 'crawler'

jobs:
  # ============================================================
  # 阶段 1: 代码质量检查
  # ============================================================
  lint-and-validate:
    name: 代码质量检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置部署环境
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=test" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: 生成版本号
        id: version
        run: |
          if [ -f "${{ env.MINIPROGRAM_ROOT }}/package.json" ]; then
            VERSION=$(node -p "require('./${{ env.MINIPROGRAM_ROOT }}/package.json').version")
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 版本号: $VERSION"

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './crawler/package-lock.json'

      - name: 爬虫代码检查
        working-directory: ./${{ env.CRAWLER_ROOT }}
        run: |
          echo "🔍 检查爬虫代码..."
          npm ci
          for f in crawler.js import_to_cloud.js output_cloud.js seedData.js simulate_import.js; do
            if [ -f "$f" ]; then
              node -c "$f" && echo "✓ $f"
            fi
          done
          npm audit --audit-level=high --production
        continue-on-error: true

      - name: 云函数检查
        run: |
          echo "🔍 检查云函数..."
          PASS=0
          FAIL=0
          for dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            name=$(basename "$dir")
            echo "--- 检查: $name ---"

            if [ -f "${dir}package.json" ]; then
              if node -e "JSON.parse(require('fs').readFileSync('${dir}package.json','utf8'))" 2>/dev/null; then
                echo "  ✓ package.json"
                ((PASS++)) || true
              else
                echo "  ✗ package.json 格式错误"
                ((FAIL++)) || true
              fi
            fi

            if [ -f "${dir}index.js" ]; then
              if node -c "${dir}index.js" 2>/dev/null; then
                echo "  ✓ index.js"
                ((PASS++)) || true
              else
                echo "  ✗ index.js 语法错误"
                ((FAIL++)) || true
              fi
            fi
          done
          echo "通过 $PASS 项, 失败 $FAIL 项"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi

      - name: 小程序配置文件检查
        run: |
          echo "🔍 检查配置文件..."
          node -e "JSON.parse(require('fs').readFileSync('project.config.json','utf8'))" \
            && echo "✓ project.config.json"

      - name: 安全检查
        run: |
          echo "🔒 安全检查..."
          FOUND=0
          # 检查硬编码密钥赋值模式（排除 SDK 参数名引用）
          if grep -rnE '(secretId|secretKey|SECRET_ID|SECRET_KEY|accessKeyId|accessKeySecret)\s*[=:]\s*["\x27][^"\x27]{10,}' \
            --include="*.js" --include="*.json" . \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.claude; then
            echo "❌ 发现可能的硬编码密钥"
            FOUND=1
          fi
          # 检查大文件
          LARGE=$(find . -type f -size +10M \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./crawler/output/*" 2>/dev/null || true)
          if [ -n "$LARGE" ]; then
            echo "⚠ 发现大文件:"
            echo "$LARGE"
          fi
          if [ "$FOUND" -gt 0 ]; then exit 1; fi
          echo "✓ 安全检查通过"

  # ============================================================
  # 阶段 2: 自动化测试
  # ============================================================
  test:
    name: 自动化测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-validate
    if: ${{ !github.event.inputs.skip_tests || github.event.inputs.skip_tests == 'false' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        working-directory: ./${{ env.CRAWLER_ROOT }}
        run: npm ci

      - name: 运行单元测试
        working-directory: ./${{ env.CRAWLER_ROOT }}
        run: |
          echo "🧪 运行测试..."
          if node -e "const p=require('./package.json'); if(p.scripts&&p.scripts.test) process.exit(0); process.exit(1);" 2>/dev/null; then
            npm test
          else
            echo "⚠ 未找到测试脚本，跳过"
          fi

      - name: 云函数语法测试
        run: |
          echo "🧪 云函数语法测试..."
          PASS=0
          for dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            if [ -f "${dir}index.js" ]; then
              node -c "${dir}index.js" && ((PASS++)) || true
            fi
          done
          echo "✓ $PASS 个云函数语法检查通过"

  # ============================================================
  # 阶段 3: 构建
  # ============================================================
  build:
    name: 构建
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-validate, test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装小程序依赖
        working-directory: ./${{ env.MINIPROGRAM_ROOT }}
        run: |
          if [ -f "package.json" ]; then
            npm ci || npm install
            echo "✓ 依赖安装完成"
          else
            echo "⚠ 未找到 package.json"
          fi

      - name: 生成版本信息
        run: |
          cat > version.json << EOF
          {
            "version": "${{ needs.lint-and-validate.outputs.version }}",
            "environment": "${{ needs.lint-and-validate.outputs.environment }}",
            "buildTime": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}"
          }
          EOF
          cat version.json

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}
          path: |
            ${{ env.MINIPROGRAM_ROOT }}
            version.json
          retention-days: 30

  # ============================================================
  # 阶段 4: 部署云函数
  # ============================================================
  deploy-cloud-functions:
    name: 部署云函数
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    environment: ${{ needs.lint-and-validate.outputs.environment }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装云开发 CLI
        run: |
          npm install -g @cloudbase/cli
          tcb --version

      - name: 配置云开发
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          tcb login --key $TCB_SECRET_ID $TCB_SECRET_KEY
          echo "TCB_ENV_ID=$TCB_ENV_ID" >> $GITHUB_ENV
          echo "✓ 云开发配置完成 - 环境: $TCB_ENV_ID"

      - name: 部署云函数
        run: |
          echo "🚀 开始部署云函数..."
          for func_dir in ${{ env.CLOUD_FUNCTIONS_ROOT }}/*/; do
            func_name=$(basename "$func_dir")
            echo "--- 部署: $func_name ---"
            cd "$func_dir"
            if [ -f "package.json" ]; then
              npm ci --production 2>/dev/null || npm install --production
            fi
            tcb fn deploy "$func_name" -e "$TCB_ENV_ID"
            cd - > /dev/null
            echo "✓ $func_name 部署完成"
          done
          echo "🎉 所有云函数部署完成！"

      - name: 验证部署
        run: |
          tcb fn list -e "$TCB_ENV_ID"
          echo "✓ 验证完成"

  # ============================================================
  # 阶段 5: 部署小程序
  # ============================================================
  deploy-miniprogram:
    name: 部署小程序
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, deploy-cloud-functions]
    environment: ${{ needs.lint-and-validate.outputs.environment }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}
          path: .

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 写入上传密钥文件
        env:
          WX_CI_KEY: ${{ secrets.WX_CI_KEY }}
        run: |
          echo "$WX_CI_KEY" > /tmp/wx-ci-private.key
          chmod 600 /tmp/wx-ci-private.key
          echo "✓ 密钥文件已写入"

      - name: 安装 miniprogram-ci
        run: |
          npm install -g miniprogram-ci
          echo "✓ miniprogram-ci 安装完成"

      - name: 上传小程序代码
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          VERSION: ${{ needs.lint-and-validate.outputs.version }}
        run: |
          echo "🚀 开始上传小程序代码..."

          DESC="自动部署 - ${VERSION} - $(echo ${{ github.sha }} | cut -c1-7)"

          cat > /tmp/upload.js << 'SCRIPT'
          const ci = require('miniprogram-ci');

          (async () => {
            try {
              const project = new ci.Project({
                appid: process.env.WX_APPID,
                type: 'miniProgram',
                projectPath: process.env.MINIPROGRAM_ROOT || 'miniprogram',
                privateKeyPath: '/tmp/wx-ci-private.key',
                ignores: ['node_modules/**/*', '.git/**/*'],
              });

              const uploadResult = await ci.upload({
                project,
                version: process.env.VERSION,
                desc: process.env.DESC,
                setting: {
                  es6: true,
                  es7: true,
                  minify: true,
                  minifyJS: true,
                  minifyWXML: true,
                  minifyWXSS: true,
                  codeProtect: false,
                  uglifyFileName: false,
                },
              });

              console.log('✅ 上传成功:', JSON.stringify(uploadResult));
            } catch (error) {
              console.error('❌ 上传失败:', error.message);
              process.exit(1);
            }
          })();
          SCRIPT

          WX_APPID="$WX_APPID" \
          MINIPROGRAM_ROOT="${{ env.MINIPROGRAM_ROOT }}" \
          VERSION="$VERSION" \
          DESC="$DESC" \
          node /tmp/upload.js

          echo "✓ 小程序代码上传完成"

      - name: 清理密钥文件
        if: always()
        run: |
          rm -f /tmp/wx-ci-private.key
          echo "✓ 密钥文件已清理"

  # ============================================================
  # 阶段 6: 部署后验证 + 通知
  # ============================================================
  post-deploy:
    name: 部署后验证
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-cloud-functions, deploy-miniprogram]
    if: always()
    steps:
      - name: 生成部署总结
        run: |
          if [ "${{ needs.deploy-cloud-functions.result }}" == "success" ] && [ "${{ needs.deploy-miniprogram.result }}" == "success" ]; then
            echo "# 🎉 部署成功" >> $GITHUB_STEP_SUMMARY
          else
            echo "# ❌ 部署失败" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: ${{ needs.lint-and-validate.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- 版本: ${{ needs.lint-and-validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 云函数: ${{ needs.deploy-cloud-functions.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 小程序: ${{ needs.deploy-miniprogram.result }}" >> $GITHUB_STEP_SUMMARY
